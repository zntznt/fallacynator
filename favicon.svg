<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Steely favicon: a simplified steel I-beam with a calm face. Hardcoded colors (favicons
       can't read page CSS vars). Sage on paper to match the brand. -->
  <rect width="32" height="32" rx="7" fill="#5b6f5a"/>
  <!-- I-beam in paper color -->
  <rect x="7" y="6" width="18" height="4" rx="1.5" fill="#faf6ef"/>
  <rect x="13.5" y="9" width="5" height="14" fill="#faf6ef"/>
  <rect x="7" y="22" width="18" height="4" rx="1.5" fill="#faf6ef"/>
  <!-- tiny face on the web -->
  <circle cx="14.6" cy="15" r="1.1" fill="#5b6f5a"/>
  <circle cx="17.4" cy="15" r="1.1" fill="#5b6f5a"/>
  <path d="M14.4 17.6 Q16 19 17.6 17.6" fill="none" stroke="#5b6f5a" stroke-width="0.9" stroke-linecap="round"/>
</svg>
