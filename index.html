<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steelman — read an argument at its strongest before you judge it</title>
  <meta name="description" content="A fair-minded thinking companion. Paste an argument, check what it does well, and find out whether something's actually wrong with it — or whether it makes sense. ('Steelman' means reading an argument at its strongest before you judge it.)">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <!-- Persistent mascot host: one long-lived canvas that reacts to stage changes (not re-created
       per screen). The static SVG fallback inside shows until/unless p5 takes over. -->
  <div id="mascot-canvas" aria-hidden="true">
    <span id="mascot-fallback"><!-- ui.js injects the inline SVG here as a graceful fallback --></span>
  </div>
  <main id="app" aria-live="polite">
    <!-- screens are rendered here by src/ui.js -->
    <noscript>
      <section class="card">
        <h1>Steelman</h1>
        <p>This thinking companion needs JavaScript to run. It does all its reasoning in your browser — nothing is sent anywhere.</p>
      </section>
    </noscript>
  </main>
  <footer class="site-foot">
    <span>Steelman</span>
    <span class="dot">·</span>
    <span>Innocent until proven otherwise.</span>
    <span class="dot">·</span>
    <a href="https://github.com/zntznt/steelman">source</a>
  </footer>
  <!-- Steely mascot — dependency-free animated SVG (no CDN, works offline). If it ever fails to
       start, the static SVG fallback (injected by ui.js) simply remains. -->
  <script defer src="src/mascot.js"></script>
  <script type="module" src="src/ui.js"></script>
</body>
</html>
